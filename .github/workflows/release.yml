name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target.name }}
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: windows-x64
            runner: windows-latest
            binary: uzumaki.exe
            asset: uzumaki-windows-x64.zip
          - name: macos-x64
            runner: macos-15-intel
            binary: uzumaki
            asset: uzumaki-macos-x64.zip
          - name: macos-arm64
            runner: macos-14
            binary: uzumaki
            asset: uzumaki-macos-arm64.zip
          - name: linux-x64
            runner: ubuntu-latest
            binary: uzumaki
            asset: uzumaki-linux-x64.zip

    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libfontconfig1-dev

      - uses: dsherret/rust-toolchain-file@v1

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-registry-${{ matrix.target.name }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-${{ matrix.target.name }}-

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: target
          key: cargo-target-${{ matrix.target.name }}-dist-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-target-${{ matrix.target.name }}-dist-

      - name: Build
        run: cargo build --profile dist -p uzumaki

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/dist
          chmod +x ${{ matrix.target.binary }}
          zip ${{ matrix.target.asset }} ${{ matrix.target.binary }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/dist
          Compress-Archive -Path ${{ matrix.target.binary }} -DestinationPath ${{ matrix.target.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.name }}
          path: target/dist/${{ matrix.target.asset }}
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/windows-x64/uzumaki-windows-x64.zip
            artifacts/macos-x64/uzumaki-macos-x64.zip
            artifacts/macos-arm64/uzumaki-macos-arm64.zip
            artifacts/linux-x64/uzumaki-linux-x64.zip
